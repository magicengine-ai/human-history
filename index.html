<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类历史发展进程 - Timeline of Human History</title>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Chart.js for Statistics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-primary: #0c0c0c;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-gold: #ffd700;
            --accent-red: #ff6b6b;
            --accent-cyan: #4ecdc4;
            --accent-blue: #45b7d1;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --text-primary: #1a1a2e;
            --text-secondary: #666666;
            --accent-gold: #d4a017;
            --accent-red: #e63946;
            --accent-cyan: #2a9d8f;
            --accent-blue: #1d758f;
            --card-bg: rgba(0, 0, 0, 0.05);
            --card-border: rgba(0, 0, 0, 0.1);
            --card-hover: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Language Switcher */
        .lang-switcher {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            padding: 10px 20px;
            border: 2px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 0.9em;
        }

        .lang-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent-gold);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            border-color: var(--accent-gold);
            color: #000;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--card-hover);
        }

        /* Bookmarks Panel */
        .bookmarks-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 20px;
            z-index: 999;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .bookmarks-panel.active {
            display: block;
        }

        .bookmarks-panel h3 {
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .bookmark-item {
            padding: 10px;
            background: var(--card-bg);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bookmark-item:hover {
            background: var(--card-hover);
        }

        .bookmark-item-title {
            color: var(--text-primary);
            font-size: 0.95em;
            margin-bottom: 5px;
        }

        .bookmark-item-time {
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        .remove-bookmark {
            float: right;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 1.2em;
        }

        /* Header */
        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 40px;
            border: 1px solid var(--card-border);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 15px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-red), var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.3em;
            position: relative;
            z-index: 1;
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .control-btn {
            padding: 12px 25px;
            border: 2px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            border-color: var(--accent-gold);
            color: #000;
            font-weight: bold;
        }

        /* Timeline Navigation */
        .timeline-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .nav-btn {
            padding: 12px 25px;
            border: 2px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            border-color: var(--accent-gold);
            color: #000;
            font-weight: bold;
        }

        /* Filter Buttons */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: rgba(78, 205, 196, 0.2);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* Time Scale Filter */
        .time-scale-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .time-scale-btn {
            padding: 8px 20px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .time-scale-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent-gold);
            color: var(--text-primary);
        }

        .time-scale-btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Search Box */
        .search-box {
            max-width: 600px;
            margin: 30px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: var(--card-hover);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Map Container */
        #mapContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: rgba(0, 0, 0, 0.95);
        }

        #mapContainer.active {
            display: block;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-close {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 12px 25px;
            background: rgba(255, 107, 107, 0.9);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .map-close:hover {
            background: rgba(255, 107, 107, 1);
            transform: scale(1.05);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: var(--card-hover);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 1em;
        }

        /* Charts Section */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--card-border);
        }

        .chart-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: var(--text-primary);
            text-align: center;
        }

        /* Era Section */
        .era-section {
            margin: 60px 0;
            position: relative;
        }

        .era-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            cursor: pointer;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .era-header:hover {
            background: var(--card-hover);
            transform: translateX(10px);
        }

        .era-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            background: var(--card-bg);
            flex-shrink: 0;
        }

        .era-info h2 {
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .era-info p {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .era-time {
            margin-left: auto;
            text-align: right;
            color: var(--accent-gold);
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 50px;
            margin: 30px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent-gold), var(--accent-red), var(--accent-cyan), var(--accent-blue));
            border-radius: 2px;
        }

        .event {
            position: relative;
            margin: 30px 0;
            padding: 25px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .event:hover {
            background: var(--card-hover);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .event::before {
            content: '';
            position: absolute;
            left: -38px;
            top: 30px;
            width: 20px;
            height: 20px;
            background: var(--accent-gold);
            border-radius: 50%;
            border: 4px solid var(--bg-primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .event-time {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            color: #000;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .event h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .event p {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .event-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 12px;
            background: var(--card-bg);
            border-radius: 15px;
            font-size: 0.85em;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--card-border);
        }

        .tag:hover {
            transform: scale(1.05);
        }

        .tag.culture { background: rgba(78, 205, 196, 0.2); color: var(--accent-cyan); }
        .tag.technology { background: rgba(69, 183, 209, 0.2); color: var(--accent-blue); }
        .tag.politics { background: rgba(255, 107, 107, 0.2); color: var(--accent-red); }
        .tag.science { background: rgba(255, 215, 0, 0.2); color: var(--accent-gold); }
        .tag.economy { background: rgba(102, 126, 234, 0.2); color: #667eea; }
        .tag.military { background: rgba(247, 127, 136, 0.2); color: #f77f88; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 25px;
            padding: 50px;
            max-width: 800px;
            width: 90%;
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5em;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: var(--accent-gold);
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 2.5em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-time {
            font-size: 1.3em;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            padding: 10px 20px;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 10px;
            display: inline-block;
        }

        .modal-body {
            line-height: 1.9;
            color: var(--text-secondary);
            font-size: 1.05em;
        }

        .modal-body h3 {
            color: var(--text-primary);
            margin: 25px 0 15px 0;
            font-size: 1.5em;
        }

        .modal-body ul {
            margin-left: 25px;
            margin-bottom: 20px;
        }

        .modal-body li {
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .modal-body strong {
            color: var(--accent-gold);
        }

        .modal-location {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-location:hover {
            background: rgba(78, 205, 196, 0.2);
        }

        .modal-location strong {
            color: var(--accent-cyan);
        }

        /* Related Events */
        .related-events {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }

        .related-events h4 {
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .related-event-item {
            padding: 10px 15px;
            background: var(--card-bg);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .related-event-item:hover {
            background: var(--card-hover);
            transform: translateX(5px);
        }

        /* Bookmark Button */
        .bookmark-btn {
            position: absolute;
            top: 20px;
            right: 70px;
            padding: 10px 15px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .bookmark-btn:hover {
            background: var(--card-hover);
            color: var(--accent-gold);
        }

        .bookmark-btn.active {
            color: var(--accent-gold);
            background: rgba(255, 215, 0, 0.2);
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1001;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-red), var(--accent-cyan), var(--accent-blue));
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .zoom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: var(--card-hover);
            border-color: var(--accent-gold);
            transform: scale(1.1);
        }

        /* Highlight */
        .highlight {
            background: rgba(255, 215, 0, 0.2);
            border-color: var(--accent-gold);
        }

        .highlight-text {
            background: rgba(255, 215, 0, 0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }

        /* Fade In Animation */
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .era-header {
                flex-direction: column;
                text-align: center;
            }

            .era-time {
                margin-left: 0;
                margin-top: 15px;
            }

            .timeline {
                padding-left: 30px;
            }

            .timeline::before {
                left: 10px;
            }

            .event::before {
                left: -28px;
            }

            .modal-content {
                padding: 30px;
            }

            .zoom-controls {
                bottom: 20px;
                right: 20px;
            }

            .zoom-btn {
                width: 45px;
                height: 45px;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            .bookmarks-panel {
                width: 280px;
                right: 10px;
            }

            .lang-switcher {
                top: 10px;
                left: 10px;
            }

            .theme-toggle {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->

        <div class="progress-fill" id="progressFill"></div>
    </div>

        <button class="lang-btn active" onclick="switchLanguage('zh')" id="langZh">🇨🇳 中文</button>
        <button class="lang-btn" onclick="switchLanguage('en')" id="langEn">🇺🇸 English</button>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

    <!-- Bookmarks Panel -->
    <div class="bookmarks-panel" id="bookmarksPanel">
        <h3 data-i18n="bookmarks">🔖 我的收藏</h3>
        <div id="bookmarksList"></div>
    </div>

    <!-- Map Container -->
    <div id="mapContainer">
        <button class="map-close" onclick="closeMap()" data-i18n="closeMap">✕ 关闭地图</button>
        <div id="map"></div>
    </div>

    <!-- Modal for Event Details -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">×</span>
            <button class="bookmark-btn" onclick="toggleBookmark()" id="modalBookmarkBtn" title="收藏">☆</button>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-time" id="modalTime"></div>
            <div class="modal-location" id="modalLocation" onclick="showOnMap()">
                <span>📍</span>
                <strong id="modalLocationText"></strong>
                <span style="margin-left: 10px; color: var(--accent-cyan);" data-i18n="viewOnMap">(点击查看地图位置)</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="related-events" id="relatedEvents"></div>
        </div>
    </div>

    <div class="container">
        <header class="fade-in">
            <h1 data-i18n="title">🌍 人类历史发展进程</h1>
            <p class="subtitle" data-i18n="subtitle">Timeline of Human History - From Origins to Present</p>
        </header>

        <!-- Search Box -->
        <div class="search-box fade-in">
            <input type="text" class="search-input" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 搜索历史事件、文明、人物..." oninput="searchEvents()">

        <!-- Control Panel -->
        <div class="control-panel fade-in">

            </button>
            <button class="control-btn" onclick="switchView('map')" id="mapViewBtn">
                <span data-i18n="mapView">🗺️ 地图模式</span>
            </button>
            <button class="control-btn" onclick="toggleBookmarks()" id="bookmarksBtn">
                <span data-i18n="bookmarks">🔖 收藏</span>
            </button>
        </div>

        <!-- Time Scale Filter -->
        <div class="time-scale-nav fade-in">
            <button class="time-scale-btn active" onclick="filterByTimeScale('all')" data-i18n="timeAll">全部时间</button>
            <button class="time-scale-btn" onclick="filterByTimeScale('millennium')" data-i18n="timeMillennium">千年尺度</button>

            <button class="time-scale-btn" onclick="filterByTimeScale('decade')" data-i18n="timeDecade">年代尺度</button>

        <!-- Filter Buttons -->

            <button class="filter-btn active" onclick="filterByTag('all')" data-i18n="filterAll">全部</button>
            <button class="filter-btn" onclick="filterByTag('culture')" data-i18n="filterCulture">🎨 文化</button>

        <!-- Timeline Navigation -->

            <button class="nav-btn active" onclick="filterEra('all')" data-i18n="eraAll">全部</button>
            <a href="prehistoric.html" class="nav-btn" style="text-decoration:none;display:inline-block" data-i18n="eraPrehistoric">🪨 史前时期</a>

            <a href="medieval.html" class="nav-btn" style="text-decoration:none;display:inline-block" data-i18n="eraMedieval">🏰 中世纪</a>
            <a href="early-modern.html" class="nav-btn" style="text-decoration:none;display:inline-block" data-i18n="eraEarlyModern">⛵ 近代早期</a>

        <!-- Timeline Content -->

        // Language switch function
        function switchLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('historyLang', lang);
            
            // Update language buttons
            document.getElementById('langZh').classList.toggle('active', lang === 'zh');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            
            // Update HTML lang attribute
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            
            // Update all i18n elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            
            // Update placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang][key]) {
                    el.placeholder = translations[lang][key];
                }
            });
            
            // Update theme button
            const theme = localStorage.getItem('historyTheme') || 'dark';
            document.querySelector('.theme-toggle').textContent = theme === 'dark' ? (lang === 'zh' ? '🌙' : '🌙') : (lang === 'zh' ? '☀️' : '☀️');
            
            // Re-render timeline and charts
            renderTimeline();
            if (eraChart) {
                eraChart.destroy();
                categoryChart.destroy();
                renderCharts();
            }
            
            // Update bookmarks panel
            updateBookmarksPanel();

            let html = '';
            for (const [eraKey, eraInfo] of Object.entries(eras)) {
                const eraEvents = historicalEvents.filter(e => e.era === eraKey);
                if (eraEvents.length === 0) continue;

                html += `
                    <div class="era-section fade-in" data-era="${eraKey}">

                            <div class="era-icon">${eraInfo.icon}</div>

                            <div class="era-time">${eraEvents.length} ${currentLang === 'zh' ? '个事件' : 'events'}</div>
                        </div>
                        <div class="timeline" id="era-${eraKey}">
                `;

                eraEvents.forEach(event => {
                    html += `
                        <div class="event" data-tags="${event.tags.join(' ')}" data-year="${event.year}" onclick="showEventModal(${event.id})">

                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;

                data: {
                    labels: Object.keys(categoryCount).map(t => getTagName(t)),
                    datasets: [{
                        data: Object.values(categoryCount),
                        backgroundColor: [
                            'rgba(255, 215, 0, 0.7)',
                            'rgba(255, 107, 107, 0.7)',
                            'rgba(78, 205, 196, 0.7)',
                            'rgba(69, 183, 209, 0.7)',
                            'rgba(102, 126, 234, 0.7)',
                            'rgba(247, 127, 136, 0.7)'
                        ],
                        borderColor: 'rgba(255, 255, 255, 0.2)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: getComputedStyle(document.body).getPropertyValue('--text-secondary') }
                        }
                    }
                }
            });
        }

        // Show event modal
        function showEventModal(eventId) {
            const event = historicalEvents.find(e => e.id === eventId);
            if (!event) return;

            currentEventId = eventId;
            updateBookmarkButton();

            document.getElementById('modalTitle').textContent = event.title[currentLang];
            document.getElementById('modalTime').textContent = event.time[currentLang];
            document.getElementById('modalLocationText').textContent = event.location[currentLang];
            
            const t = translations[currentLang];
            document.getElementById('modalBody').innerHTML = `
                <p><strong>${t.eventDescription}：</strong></p>
                <p>${event.description[currentLang]}</p>
                <p><strong>${t.eventDetails}：</strong></p>
                <p>${event.details[currentLang]}</p>
                <p><strong>${t.eventImpact}：</strong></p>
                <p>${event.impact[currentLang]}</p>
                <p><strong>${t.eventTags}：</strong></p>
                <div class="event-tags">
                    ${event.tags.map(tag => `<span class="tag ${tag}">${getTagName(tag)}</span>`).join('')}
                </div>
            `;

            // Show related events
            const relatedEvents = historicalEvents
                .filter(e => e.id !== eventId && e.tags.some(t => event.tags.includes(t)))
                .slice(0, 3);

            if (relatedEvents.length > 0) {
                const relatedHtml = `
                    <h4>${t.relatedEvents}</h4>
                    ${relatedEvents.map(e => `
                        <div class="related-event-item" onclick="showEventModal(${e.id})">
                            <div style="color: var(--text-primary); font-weight: bold;">${e.title[currentLang]}</div>
                            <div style="color: var(--text-secondary); font-size: 0.9em;">${e.time[currentLang]}</div>
                        </div>
                    `).join('')}
                `;
                document.getElementById('relatedEvents').innerHTML = relatedHtml;
            } else {
                document.getElementById('relatedEvents').innerHTML = '';
            }

            document.getElementById('eventModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
            currentEventId = null;
        }

        // Close modal when clicking outside
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Search events
        function searchEvents() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const events = document.querySelectorAll('.event');

            events.forEach(event => {
                const title = event.querySelector('h3').textContent.toLowerCase();
                const desc = event.querySelector('p').textContent.toLowerCase();
                
                if (title.includes(query) || desc.includes(query)) {
                    event.style.display = 'block';
                    if (query) {
                        event.classList.add('highlight');
                    } else {
                        event.classList.remove('highlight');
                    }
                } else {
                    event.style.display = 'none';
                }
            });
        }

        // Filter by tag
        function filterByTag(tag) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const events = document.querySelectorAll('.event');
            events.forEach(event => {
                if (tag === 'all' || event.dataset.tags.includes(tag)) {
                    event.style.display = 'block';
                } else {
                    event.style.display = 'none';
                }
            });
        }

        // Filter by era
        function filterEra(era) {
            const buttons = document.querySelectorAll('.timeline-nav .nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const sections = document.querySelectorAll('.era-section');
            sections.forEach(section => {
                if (era === 'all' || section.dataset.era === era) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        }

        // Filter by time scale
        function filterByTimeScale(scale) {
            const buttons = document.querySelectorAll('.time-scale-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const events = document.querySelectorAll('.event');
            events.forEach(event => {
                const year = Math.abs(parseInt(event.dataset.year) || 0);
                let show = true;

                if (scale === 'millennium') {
                    show = year >= 1000 || event.dataset.year < -1000;
                } else if (scale === 'century') {
                    show = year >= 100 && year < 1000;
                } else if (scale === 'decade') {
                    show = year < 100;
                }

                event.style.display = show ? 'block' : 'none';
            });
        }

        // Toggle era section
        function toggleEra(eraKey) {
            const timeline = document.getElementById(`era-${eraKey}`);
            if (timeline.style.display === 'none') {
                timeline.style.display = 'block';
            } else {
                timeline.style.display = 'none';
            }
        }

        // Switch view (timeline/map)
        function switchView(view) {
            currentView = view;
            
            if (view === 'map') {
                document.getElementById('mapViewBtn').classList.add('active');
                document.getElementById('timelineViewBtn').classList.remove('active');
                document.getElementById('mapContainer').classList.add('active');
                initMap();
            } else {
                document.getElementById('timelineViewBtn').classList.add('active');
                document.getElementById('mapViewBtn').classList.remove('active');
                document.getElementById('mapContainer').classList.remove('active');
            }
        }

        // Initialize map
        function initMap() {
            if (map) return;

            map = L.map('map').setView([20, 0], 2);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            historicalEvents.forEach(event => {
                if (event.lat && event.lng) {
                    const marker = L.marker([event.lat, event.lng]).addTo(map);
                    marker.bindPopup(`
                        <div style="color: #333; min-width: 200px;">
                            <h3 style="margin: 0 0 10px 0; color: #1a1a2e;">${event.title[currentLang]}</h3>
                            <p style="margin: 0 0 5px 0;"><strong>${currentLang === 'zh' ? '时间' : 'Time'}：</strong>${event.time[currentLang]}</p>
                            <p style="margin: 0 0 10px 0;"><strong>${currentLang === 'zh' ? '地点' : 'Location'}：</strong>${event.location[currentLang]}</p>
                            <p style="margin: 0;">${event.description[currentLang]}</p>
                        </div>
                    `);
                }
            });

            if (historicalEvents.length > 0) {
                const group = new L.featureGroup(historicalEvents.filter(e => e.lat && e.lng).map(e => L.marker([e.lat, e.lng])));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // Close map
        function closeMap() {
            document.getElementById('mapContainer').classList.remove('active');
            switchView('timeline');
        }

        // Show event on map
        function showOnMap() {
            const modalTitle = document.getElementById('modalTitle').textContent;
            const event = historicalEvents.find(e => e.title[currentLang] === modalTitle);
            
            if (event && event.lat && event.lng) {
                document.getElementById('mapContainer').classList.add('active');
                initMap();
                map.setView([event.lat, event.lng], 6);
                
                map.eachLayer(function(layer) {
                    if (layer instanceof L.Marker) {
                        const popup = layer.getPopup();
                        if (popup && popup._content.includes(modalTitle)) {
                            layer.openPopup();
                        }
                    }
                });
            }
        }

        // Zoom controls
        function zoomIn() {
            const container = document.querySelector('.container');
            currentZoom = Math.min(currentZoom + 0.1, 1.5);
            container.style.zoom = currentZoom;
        }

        function zoomOut() {
            const container = document.querySelector('.container');
            currentZoom = Math.max(currentZoom - 0.1, 0.5);
            container.style.zoom = currentZoom;
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('historyTheme', newTheme);
            
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = newTheme === 'dark' ? '🌙' : '☀️';
            
            // Update charts
            if (eraChart) {
                eraChart.destroy();
                categoryChart.destroy();
                renderCharts();
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('historyTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // Bookmark functions
        function toggleBookmark() {
            if (!currentEventId) return;
            
            const index = bookmarks.indexOf(currentEventId);
            if (index > -1) {
                bookmarks.splice(index, 1);
            } else {
                bookmarks.push(currentEventId);
            }
            
            localStorage.setItem('historyBookmarks', JSON.stringify(bookmarks));
            updateBookmarkButton();
            updateBookmarksPanel();
        }

        function updateBookmarkButton() {
            const btn = document.getElementById('modalBookmarkBtn');
            if (!btn || !currentEventId) return;
            
            const isBookmarked = bookmarks.includes(currentEventId);
            btn.textContent = isBookmarked ? '★' : '☆';
            btn.classList.toggle('active', isBookmarked);
        }

        function toggleBookmarks() {
            const panel = document.getElementById('bookmarksPanel');
            panel.classList.toggle('active');
            updateBookmarksPanel();
        }

        function updateBookmarksPanel() {
            const panel = document.getElementById('bookmarksList');
            const t = translations[currentLang];
            
            if (bookmarks.length === 0) {
                panel.innerHTML = `<p style="color: var(--text-secondary); text-align: center; padding: 20px;">${t.noBookmarks}</p>`;
                return;
            }

            const bookmarkedEvents = historicalEvents.filter(e => bookmarks.includes(e.id));
            panel.innerHTML = bookmarkedEvents.map(event => `
                <div class="bookmark-item" onclick="showEventModal(${event.id}); toggleBookmarks();">
                    <span class="remove-bookmark" onclick="event.stopPropagation(); removeBookmark(${event.id})">×</span>
                    <div class="bookmark-item-title">${event.title[currentLang]}</div>
                    <div class="bookmark-item-time">${event.time[currentLang]}</div>
                </div>
            `).join('');
        }

        function removeBookmark(eventId) {
            const index = bookmarks.indexOf(eventId);
            if (index > -1) {
                bookmarks.splice(index, 1);
                localStorage.setItem('historyBookmarks', JSON.stringify(bookmarks));
                updateBookmarksPanel();
                if (currentEventId === eventId) {
                    updateBookmarkButton();
                }
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeMap();
                document.getElementById('bookmarksPanel').classList.remove('active');
            }
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
            if (e.key === 'b' && e.ctrlKey) {
                e.preventDefault();
                toggleBookmarks();
            }
        });
    </script>
</body>
</html>
