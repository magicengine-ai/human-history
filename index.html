<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类历史发展进程 - Timeline of Human History</title>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.3em;
            position: relative;
            z-index: 1;
        }

        /* Control Panel */
        .control-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .control-btn {
            padding: 12px 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border-color: #ffd700;
            color: #000;
            font-weight: bold;
        }

        /* Timeline Navigation */
        .timeline-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .nav-btn {
            padding: 12px 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border-color: #ffd700;
            color: #000;
            font-weight: bold;
        }

        /* Filter Buttons */
        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #a0a0a0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #4ecdc4;
            color: #fff;
        }

        .filter-btn.active {
            background: rgba(78, 205, 196, 0.2);
            border-color: #4ecdc4;
            color: #4ecdc4;
        }

        /* Search Box */
        .search-box {
            max-width: 600px;
            margin: 30px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.12);
        }

        .search-input::placeholder {
            color: #666;
        }

        /* Map Container */
        #mapContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: rgba(0, 0, 0, 0.95);
        }

        #mapContainer.active {
            display: block;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-close {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 12px 25px;
            background: rgba(255, 107, 107, 0.9);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .map-close:hover {
            background: rgba(255, 107, 107, 1);
            transform: scale(1.05);
        }

        /* Era Section */
        .era-section {
            margin: 60px 0;
            position: relative;
        }

        .era-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            cursor: pointer;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .era-header:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(10px);
        }

        .era-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .era-info h2 {
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .era-info p {
            color: #a0a0a0;
            font-size: 1.1em;
        }

        .era-time {
            margin-left: auto;
            text-align: right;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 50px;
            margin: 30px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #ffd700, #ff6b6b, #4ecdc4, #45b7d1);
            border-radius: 2px;
        }

        .event {
            position: relative;
            margin: 30px 0;
            padding: 25px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .event:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .event::before {
            content: '';
            position: absolute;
            left: -38px;
            top: 30px;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            border: 4px solid #0c0c0c;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .event-time {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #000;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .event h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #fff;
        }

        .event p {
            color: #b0b0b0;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .event-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 0.85em;
            color: #a0a0a0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tag:hover {
            transform: scale(1.05);
        }

        .tag.culture { background: rgba(78, 205, 196, 0.2); color: #4ecdc4; }
        .tag.technology { background: rgba(69, 183, 209, 0.2); color: #45b7d1; }
        .tag.politics { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .tag.science { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
        .tag.economy { background: rgba(102, 126, 234, 0.2); color: #667eea; }
        .tag.military { background: rgba(247, 127, 136, 0.2); color: #f77f88; }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #a0a0a0;
            font-size: 1em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 25px;
            padding: 50px;
            max-width: 800px;
            width: 90%;
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5em;
            cursor: pointer;
            color: #a0a0a0;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: #ffd700;
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 2.5em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-time {
            font-size: 1.3em;
            color: #4ecdc4;
            margin-bottom: 25px;
            padding: 10px 20px;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 10px;
            display: inline-block;
        }

        .modal-body {
            line-height: 1.9;
            color: #d0d0d0;
            font-size: 1.05em;
        }

        .modal-body h3 {
            color: #fff;
            margin: 25px 0 15px 0;
            font-size: 1.5em;
        }

        .modal-body ul {
            margin-left: 25px;
            margin-bottom: 20px;
        }

        .modal-body li {
            margin-bottom: 10px;
            color: #b0b0b0;
        }

        .modal-body strong {
            color: #ffd700;
        }

        .modal-location {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-location:hover {
            background: rgba(78, 205, 196, 0.2);
        }

        .modal-location strong {
            color: #4ecdc4;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1001;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4, #45b7d1);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .zoom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            transform: scale(1.1);
        }

        /* Highlight */
        .highlight {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .highlight-text {
            background: rgba(255, 215, 0, 0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }

        /* Fade In Animation */
        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .era-header {
                flex-direction: column;
                text-align: center;
            }

            .era-time {
                margin-left: 0;
                margin-top: 15px;
            }

            .timeline {
                padding-left: 30px;
            }

            .timeline::before {
                left: 10px;
            }

            .event::before {
                left: -28px;
            }

            .modal-content {
                padding: 30px;
            }

            .zoom-controls {
                bottom: 20px;
                right: 20px;
            }

            .zoom-btn {
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Map Container -->
    <div id="mapContainer">
        <button class="map-close" onclick="closeMap()">✕ 关闭地图</button>
        <div id="map"></div>
    </div>

    <!-- Modal for Event Details -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">×</span>
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-time" id="modalTime"></div>
            <div class="modal-location" id="modalLocation" onclick="showOnMap()">
                <span>📍</span>
                <strong id="modalLocationText"></strong>
                <span style="margin-left: 10px; color: #4ecdc4;">(点击查看地图位置)</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="container">
        <header class="fade-in">
            <h1>🌍 人类历史发展进程</h1>
            <p class="subtitle">Timeline of Human History - From Origins to Present</p>
        </header>

        <!-- Search Box -->
        <div class="search-box fade-in">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索历史事件、文明、人物..." oninput="searchEvents()">
        </div>

        <!-- Control Panel -->
        <div class="control-panel fade-in">
            <button class="control-btn active" onclick="switchView('timeline')" id="timelineViewBtn">
                <span>📜</span> 时间线视图
            </button>
            <button class="control-btn" onclick="switchView('map')" id="mapViewBtn">
                <span>🗺️</span> 地图模式
            </button>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-nav fade-in">
            <button class="filter-btn active" onclick="filterByTag('all')">全部</button>
            <button class="filter-btn" onclick="filterByTag('culture')">🎨 文化</button>
            <button class="filter-btn" onclick="filterByTag('technology')">⚙️ 科技</button>
            <button class="filter-btn" onclick="filterByTag('politics')">🏛️ 政治</button>
            <button class="filter-btn" onclick="filterByTag('science')">🔬 科学</button>
            <button class="filter-btn" onclick="filterByTag('economy')">💰 经济</button>
            <button class="filter-btn" onclick="filterByTag('military')">⚔️ 军事</button>
        </div>

        <!-- Timeline Navigation -->
        <div class="timeline-nav fade-in">
            <button class="nav-btn active" onclick="filterEra('all')">全部</button>
            <a href="prehistoric.html" class="nav-btn" style="text-decoration:none;display:inline-block">🪨 史前时期</a>
            <a href="ancient.html" class="nav-btn" style="text-decoration:none;display:inline-block">🏛️ 古代文明</a>
            <a href="medieval.html" class="nav-btn" style="text-decoration:none;display:inline-block">🏰 中世纪</a>
            <a href="early-modern.html" class="nav-btn" style="text-decoration:none;display:inline-block">⛵ 近代早期</a>
            <a href="modern.html" class="nav-btn" style="text-decoration:none;display:inline-block">🚀 现代</a>
        </div>

        <div class="timeline-nav fade-in" style="margin-top: 20px;">
            <a href="people.html" class="nav-btn" style="text-decoration:none;display:inline-block">👤 历史人物</a>
            <a href="civilizations.html" class="nav-btn" style="text-decoration:none;display:inline-block">🗺️ 古代文明</a>
            <a href="technology.html" class="nav-btn" style="text-decoration:none;display:inline-block">💡 科技发展</a>
            <a href="wars.html" class="nav-btn" style="text-decoration:none;display:inline-block">⚔️ 战争冲突</a>
            <a href="religions.html" class="nav-btn" style="text-decoration:none;display:inline-block">☪️ 宗教</a>
            <a href="art.html" class="nav-btn" style="text-decoration:none;display:inline-block">🎨 艺术</a>
            <a href="philosophy.html" class="nav-btn" style="text-decoration:none;display:inline-block">💭 哲学</a>
            <a href="medicine.html" class="nav-btn" style="text-decoration:none;display:inline-block">🏥 医学</a>
            <a href="exploration.html" class="nav-btn" style="text-decoration:none;display:inline-block">🧭 探险</a>
            <a href="space.html" class="nav-btn" style="text-decoration:none;display:inline-block">🚀 太空</a>
            <a href="women.html" class="nav-btn" style="text-decoration:none;display:inline-block">♀️ 女性</a>
            <a href="politics.html" class="nav-btn" style="text-decoration:none;display:inline-block">🏛️ 政治</a>
            <a href="economy.html" class="nav-btn" style="text-decoration:none;display:inline-block">💰 经济</a>

            <a href="education.html" class="nav-btn" style="text-decoration:none;display:inline-block">📚 教育</a>
            <a href="food.html" class="nav-btn" style="text-decoration:none;display:inline-block">🍽️ 饮食</a>
            <a href="fashion.html" class="nav-btn" style="text-decoration:none;display:inline-block">👕 时尚</a>
            <a href="sports.html" class="nav-btn" style="text-decoration:none;display:inline-block">🏈 体育</a>
            <a href="music.html" class="nav-btn" style="text-decoration:none;display:inline-block">🎵 音乐</a>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar fade-in">
            <div class="stat-card">
                <div class="stat-number" id="totalEvents">0</div>
                <div class="stat-label">历史事件</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCivilizations">0</div>
                <div class="stat-label">古代文明</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalYears">0</div>
                <div class="stat-label">年历史跨度</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCategories">0</div>
                <div class="stat-label">分类领域</div>
            </div>
        </div>

        <!-- Timeline Content -->
        <div id="timelineContent">
            <!-- Era sections will be populated by JavaScript -->
        </div>
    </div>

    <!-- Zoom Controls -->
    <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()" title="放大">+</button>
        <button class="zoom-btn" onclick="zoomOut()" title="缩小">−</button>
        <button class="zoom-btn" onclick="scrollToTop()" title="返回顶部">↑</button>
    </div>

    <!-- Leaflet JS for Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Historical Events Data
        const historicalEvents = [
            {
                id: 1,
                era: "prehistoric",

        // Initialize map variable
        let map = null;
        let currentView = 'timeline';
        let currentZoom = 1;

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderTimeline();
            updateStats();
            setupScrollProgress();
        });

        // Render timeline content
        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            const eras = {
                prehistoric: { name: '🪨 史前时期', icon: '🪨', time: '300 万年前 - 公元前 3500 年' },
                ancient: { name: '🏛️ 古代文明', icon: '🏛️', time: '公元前 3500 年 - 公元 476 年' },
                medieval: { name: '🏰 中世纪', icon: '🏰', time: '公元 476 年 - 1453 年' },
                'early-modern': { name: '⛵ 近代早期', icon: '⛵', time: '1453 年 - 1789 年' },
                modern: { name: '🚀 现代', icon: '🚀', time: '1789 年 - 至今' }
            };

            let html = '';
            for (const [eraKey, eraInfo] of Object.entries(eras)) {
                const eraEvents = historicalEvents.filter(e => e.era === eraKey);
                if (eraEvents.length === 0) continue;

                html += `
                    <div class="era-section fade-in" data-era="${eraKey}">
                        <div class="era-header" onclick="toggleEra('${eraKey}')">
                            <div class="era-icon">${eraInfo.icon}</div>
                            <div class="era-info">
                                <h2>${eraInfo.name}</h2>
                                <p>${eraInfo.time}</p>
                            </div>
                            <div class="era-time">${eraEvents.length} 个事件</div>
                        </div>
                        <div class="timeline" id="era-${eraKey}">
                `;

                eraEvents.forEach(event => {
                    html += `
                        <div class="event" data-tags="${event.tags.join(' ')}" onclick="showEventModal(${event.id})">
                            <span class="event-time">${event.time}</span>
                            <h3>${event.title}</h3>
                            <p>${event.description}</p>
                            <div class="event-tags">
                                ${event.tags.map(tag => `<span class="tag ${tag}" onclick="event.stopPropagation(); filterByTag('${tag}')">${getTagName(tag)}</span>`).join('')}
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // Get tag name in Chinese
        function getTagName(tag) {
            const names = {
                culture: '🎨 文化',
                technology: '⚙️ 科技',
                politics: '🏛️ 政治',
                science: '🔬 科学',
                economy: '💰 经济',
                military: '⚔️ 军事',
                exploration: '🧭 探险',
                philosophy: '💭 哲学'
            };
            return names[tag] || tag;
        }

        // Update statistics
        function updateStats() {
            document.getElementById('totalEvents').textContent = historicalEvents.length;
            document.getElementById('totalCivilizations').textContent = '16';
            document.getElementById('totalYears').textContent = '300 万+';
            document.getElementById('totalCategories').textContent = '16';
        }

        // Setup scroll progress
        function setupScrollProgress() {
            window.addEventListener('scroll', function() {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const progress = (scrollTop / docHeight) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
            });
        }

        // Show event modal
        function showEventModal(eventId) {
            const event = historicalEvents.find(e => e.id === eventId);
            if (!event) return;

            document.getElementById('modalTitle').textContent = event.title;
            document.getElementById('modalTime').textContent = event.time;
            document.getElementById('modalLocationText').textContent = event.location;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>事件描述：</strong></p>
                <p>${event.description}</p>
                <p><strong>详细信息：</strong></p>
                <p>${event.details}</p>
                <p><strong>历史影响：</strong></p>
                <p>${event.impact}</p>
                <p><strong>分类标签：</strong></p>
                <div class="event-tags">
                    ${event.tags.map(tag => `<span class="tag ${tag}">${getTagName(tag)}</span>`).join('')}
                </div>
            `;

            document.getElementById('eventModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        // Close modal when clicking outside
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Search events
        function searchEvents() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const events = document.querySelectorAll('.event');

            events.forEach(event => {
                const title = event.querySelector('h3').textContent.toLowerCase();
                const desc = event.querySelector('p').textContent.toLowerCase();
                
                if (title.includes(query) || desc.includes(query)) {
                    event.style.display = 'block';
                    if (query) {
                        event.classList.add('highlight');
                    } else {
                        event.classList.remove('highlight');
                    }
                } else {
                    event.style.display = 'none';
                }
            });
        }

        // Filter by tag
        function filterByTag(tag) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const events = document.querySelectorAll('.event');
            events.forEach(event => {
                if (tag === 'all' || event.dataset.tags.includes(tag)) {
                    event.style.display = 'block';
                } else {
                    event.style.display = 'none';
                }
            });
        }

        // Filter by era
        function filterEra(era) {
            const buttons = document.querySelectorAll('.timeline-nav .nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const sections = document.querySelectorAll('.era-section');
            sections.forEach(section => {
                if (era === 'all' || section.dataset.era === era) {
                    section.style.display = 'block';
                } else {
                    section.style.display = 'none';
                }
            });
        }

        // Toggle era section
        function toggleEra(eraKey) {
            const timeline = document.getElementById(`era-${eraKey}`);
            if (timeline.style.display === 'none') {
                timeline.style.display = 'block';
            } else {
                timeline.style.display = 'none';
            }
        }

        // Switch view (timeline/map)
        function switchView(view) {
            currentView = view;
            
            if (view === 'map') {
                document.getElementById('mapViewBtn').classList.add('active');
                document.getElementById('timelineViewBtn').classList.remove('active');
                document.getElementById('mapContainer').classList.add('active');
                initMap();
            } else {
                document.getElementById('timelineViewBtn').classList.add('active');
                document.getElementById('mapViewBtn').classList.remove('active');
                document.getElementById('mapContainer').classList.remove('active');
            }
        }

        // Initialize map
        function initMap() {
            if (map) return;

            map = L.map('map').setView([20, 0], 2);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            // Add markers for all events
            historicalEvents.forEach(event => {
                if (event.lat && event.lng) {
                    const marker = L.marker([event.lat, event.lng]).addTo(map);
                    marker.bindPopup(`
                        <div style="color: #333; min-width: 200px;">
                            <h3 style="margin: 0 0 10px 0; color: #1a1a2e;">${event.title}</h3>
                            <p style="margin: 0 0 5px 0;"><strong>时间：</strong>${event.time}</p>
                            <p style="margin: 0 0 10px 0;"><strong>地点：</strong>${event.location}</p>
                            <p style="margin: 0;">${event.description}</p>
                        </div>
                    `);
                }
            });

            // Fit map to show all markers
            if (historicalEvents.length > 0) {
                const group = new L.featureGroup(historicalEvents.filter(e => e.lat && e.lng).map(e => L.marker([e.lat, e.lng])));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // Close map
        function closeMap() {
            document.getElementById('mapContainer').classList.remove('active');
            switchView('timeline');
        }

        // Show event on map
        function showOnMap() {
            const modalTitle = document.getElementById('modalTitle').textContent;
            const event = historicalEvents.find(e => e.title === modalTitle);
            
            if (event && event.lat && event.lng) {
                document.getElementById('mapContainer').classList.add('active');
                initMap();
                map.setView([event.lat, event.lng], 6);
                
                // Find and open the popup for this marker
                map.eachLayer(function(layer) {
                    if (layer instanceof L.Marker) {
                        const popup = layer.getPopup();
                        if (popup && popup._content.includes(modalTitle)) {
                            layer.openPopup();
                        }
                    }
                });
            }
        }

        // Zoom controls
        function zoomIn() {
            const container = document.querySelector('.container');
            currentZoom = Math.min(currentZoom + 0.1, 1.5);
            container.style.zoom = currentZoom;
        }

        function zoomOut() {
            const container = document.querySelector('.container');
            currentZoom = Math.max(currentZoom - 0.1, 0.5);
            container.style.zoom = currentZoom;
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeMap();
            }
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
