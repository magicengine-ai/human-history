                            <li>留下约 13000 页手稿</li>
                            <li>镜像书写（从右向左）</li>
                            <li>包含科学、艺术、工程等多方面内容</li>
                        </ul>
                        
                        <div class="quote">"简单是终极的复杂。"</div>
                    `
                }
            },
            {
                id: 'mandela',
                name: '曼德拉',
                time: '1918-2013 年',
                avatar: '✊',
                category: 'politics',
                desc: '南非反种族隔离革命家，南非首位黑人总统',
                tags: ['政治', '人权', '和平'],
                detail: {
                    title: '曼德拉 - 和解的象征',
                    content: `
                        <h3>生平简介</h3>
                        <p>纳尔逊·曼德拉，南非反种族隔离革命家、政治家和慈善家，为废除种族隔离制度奋斗终生。</p>
                        
                        <h3>抗争历程</h3>
                        <ul>
                            <li>1944 年加入非洲人国民大会（ANC）</li>
                            <li>1964 年被判终身监禁</li>
                            <li>在狱中度过 27 年</li>
                            <li>1990 年获释</li>
                        </ul>
                        
                        <h3>政治成就</h3>
                        <ul>
                            <li>1993 年获诺贝尔和平奖</li>
                            <li>1994 年当选南非首位黑人总统</li>
                            <li>推动种族和解</li>
                            <li>建立真相与和解委员会</li>
                        </ul>
                        
                        <h3>精神遗产</h3>
                        <ul>
                            <li>宽容与和解的象征</li>
                            <li>全球人权运动偶像</li>
                            <li>"曼德拉日"（7 月 18 日）</li>
                        </ul>
                        
                        <div class="quote">"教育是最强大的武器，你可以用它来改变世界。"</div>
                    `
                }
            }
        ];

        function renderPeople(filter = 'all') {
            const grid = document.getElementById('peopleGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' 
                ? peopleData 
                : peopleData.filter(p => p.category === filter);
            
            filtered.forEach(person => {
                const card = document.createElement('div');
                card.className = 'people-card fade-in';
                card.onclick = () => showPeople(person);
                card.innerHTML = `
                    <div class="people-avatar">${person.avatar}</div>
                    <div class="people-name">${person.name}</div>
                    <div class="people-time">${person.time}</div>
                    <div class="people-desc">${person.desc}</div>
                    <div class="people-tags">
                        ${person.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterPeople(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderPeople(category);
        }

        function showPeople(person) {
            const modal = document.getElementById('peopleModal');
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 class="modal-title">${person.avatar} ${person.detail.title}</h2>
                <div class="modal-time">${person.time}</div>
                <div class="modal-body">${person.detail.content}</div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('peopleModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('peopleModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        renderPeople();
    </script>
</body>
</html>
