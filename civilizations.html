        function renderCivilizations() {
            const grid = document.getElementById('civGrid');
            grid.innerHTML = '';
            
            civilizations.forEach(civ => {
                const card = document.createElement('div');
                card.className = 'civ-card fade-in';
                card.onclick = () => showCiv(civ);
                card.innerHTML = `
                    <div class="civ-icon">${civ.icon}</div>
                    <div class="civ-name">${civ.name}</div>
                    <div class="civ-time">${civ.time}</div>
                    <div class="civ-desc">${civ.desc}</div>
                    <div class="civ-location">${civ.location}</div>
                `;
                grid.appendChild(card);
            });
        }

        function showCiv(civ) {
            const modal = document.getElementById('civModal');
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <h2 class="modal-title">${civ.icon} ${civ.detail.title}</h2>
                <div class="modal-body">${civ.detail.content}</div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('civModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('civModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        renderCivilizations();
    </script>
